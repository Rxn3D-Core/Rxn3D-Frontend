<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Sent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F9FAFB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 448px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: #1162A8;
            color: white;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h2 {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
        }

        .content {
            padding: 24px;
            text-align: center;
        }

        .icon-container {
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
        }

        .icon {
            width: 64px;
            height: 64px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 16px;
        }

        .message {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .button {
            display: inline-block;
            padding: 10px 16px;
            background: #1162A8;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
            transition: background-color 200ms ease-out;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        .button:hover {
            background: #0d4d87;
        }

        .button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Request Sent</h2>
        </div>
        <div class="content">
            <div class="icon-container">
                <div class="icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h1 class="title">Request Sent!</h1>
            <p class="message">
                Your request has been successfully sent. We'll get back to you soon.
            </p>
            <button class="button" onclick="window.close()">Done</button>
        </div>
    </div>
</body>
</html>
